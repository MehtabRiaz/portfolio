<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Site icon">
	<defs>
		<clipPath id="circle" clipPathUnits="userSpaceOnUse">
			<circle cx="16" cy="16" r="16" />
		</clipPath>
	</defs>
	<g clip-path="url(#circle)">
		<image width="32" height="32" href="data:image/jpeg;base64," preserveAspectRatio="xMidYMid slice" />
	</g>
</svg>
